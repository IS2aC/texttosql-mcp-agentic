services:

  # ── MCP Server ────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mcp-server
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
    env_file:
      - ./server/.env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/sse')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Client Web (Flask) ────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mcp-client
    environment:
      - MCP_SERVER_URL=http://server:8000/sse
      - OLLAMA_HOST=http://host.docker.internal:11434
    env_file:
      - ./client/.env
    volumes:
      - prompts_data:/app/web/system_prompts
    ports:
      - "5050:5050"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  prompts_data: